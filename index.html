<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brujita del Conocimiento 🔮 | Modo Seccional</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1e1a2f 0%, #2a1e3c 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }
        .app {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 248, 235, 0.1);
            backdrop-filter: blur(3px);
            border-radius: 3rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #FFE6B0, #E6B87E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .card {
            background: #fffaf2;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .urgent-notice {
            background: #ffe0b2;
            border-left: 5px solid #ff9800;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #e65100;
        }
        .section-selector {
            display: flex;
            gap: 10px;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .section-btn {
            flex: 1;
            min-width: 120px;
            padding: 0.8rem;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .section-btn:hover { background: #e0e0e0; }
        .section-btn.active {
            background: #6b3e26;
            color: white;
            border-color: #6b3e26;
        }
        textarea {
            width: 100%;
            padding: 1rem;
            font-size: 0.95rem;
            border: 2px solid #ecd9b4;
            border-radius: 1.5rem;
            min-height: 200px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: #6b3e26;
            color: white;
            border: none;
            border-radius: 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .result-box {
            margin-top: 1rem;
            background: #2b1e2c;
            color: #faeecb;
            padding: 1.2rem;
            border-radius: 1.5rem;
            min-height: 100px;
            white-space: pre-wrap;
        }
        .char-info {
            text-align: right;
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>🔮 Brujita - Modo Seccional</h1>
    
    <div class="card">
        <div class="urgent-notice">
            <strong>⚠️ IMPORTANTE:</strong> Para evitar el límite de tokens de Groq, procesa una sección a la vez. 
            Espera 2-3 minutos entre cada sección.
        </div>
        
        <label><strong>📂 Archivo cargado:</strong> Nuevo Documento de texto.txt (10,642 chars)</label>
        
        <div class="section-selector">
            <button class="section-btn active" onclick="selectSection(0)">
                📖 Sección 1<br><small>0-2500 chars</small>
            </button>
            <button class="section-btn" onclick="selectSection(1)">
                📖 Sección 2<br><small>2500-5000</small>
            </button>
            <button class="section-btn" onclick="selectSection(2)">
                📖 Sección 3<br><small>5000-7500</small>
            </button>
            <button class="section-btn" onclick="selectSection(3)">
                📖 Sección 4<br><small>7500-fin</small>
            </button>
        </div>
        
        <label>📜 Texto seleccionado:</label>
        <textarea id="inputText" readonly></textarea>
        <div class="char-info" id="charInfo">0 caracteres</div>
        
        <label style="margin-top: 1rem; display: block;">✨ Tipo de conjuro:</label>
        <select id="mode" style="width: 100%; padding: 0.8rem; border-radius: 1rem; margin-top: 0.5rem;">
            <option value="resumen">📖 Resumen mágico</option>
            <option value="preguntas">❓ Preguntas tipo quiz</option>
            <option value="flashcards">🃏 Flashcards</option>
            <option value="vf">⚖️ Verdadero / Falso</option>
        </select>
        
        <button id="castBtn" onclick="procesarSeccion()">🔮 Procesar esta sección 🔮</button>
        
        <div class="result-box" id="resultContainer">
            💫 El resultado aparecerá aquí...
        </div>
    </div>
</div>

<script>
    // TEXTO COMPLETO (pégalo aquí una sola vez)
    const textoCompleto = `Es el año 400 ates de Cristo. Estás en la antigua Atenas, cuna de la democracia, la filosofía y el romance sáfico. Cruzas miradas con una chica hermosa al otro lado del salón. Piensas, "Wow, una historia de amor poética y antigua." Error. Bienvenida a la absoluta y asfixiante pesadilla de ser lesbiana en la historia de la humanidad. Tu despertar gay es cancelado de inmediato por una hostil toma de poder patriarcal y corporativa. En Atenas eres una máquina expendedora biológica legalmente propiedad del Estado. Antes de que siquiera puedas tocar a esa chica, tu padre firma casualmente tu contrato físico a favor de un político de 55 años que huele aceite de oliva rancio. Tu sexualidad no existe. Tu cuerpo es una fábrica de reproducción obligatoria por el Estado, te obligan a entrar en un contrato doméstico...`; // <-- PEGA AQUÍ TODO TU TEXTO
    
    const CHUNK_SIZE = 2500;
    let seccionActual = 0;
    const chunks = [];
    
    // Dividir texto en chunks
    for (let i = 0; i < textoCompleto.length; i += CHUNK_SIZE) {
        chunks.push(textoCompleto.substring(i, i + CHUNK_SIZE));
    }
    
    function selectSection(index) {
        seccionActual = index;
        document.querySelectorAll('.section-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === index);
        });
        
        const texto = chunks[index] || '';
        document.getElementById('inputText').value = texto;
        document.getElementById('charInfo').textContent = 
            `${texto.length} caracteres | Sección ${index + 1} de ${chunks.length}`;
    }
    
    async function procesarSeccion() {
        const apiKey = localStorage.getItem('groq_api_key');
        const texto = chunks[seccionActual];
        const modo = document.getElementById('mode').value;
        
        if (!apiKey) {
            alert('⚠️ Ingresa tu API Key primero');
            return;
        }
        
        if (!texto) {
            alert('⚠️ Esta sección está vacía');
            return;
        }
        
        const btn = document.getElementById('castBtn');
        const resultDiv = document.getElementById('resultContainer');
        
        btn.disabled = true;
        resultDiv.textContent = '🌀 Procesando...';
        
        const prompt = `Brujita del Conocimiento. Texto: "${texto}".\n\n${
            modo === 'resumen' ? '📜 Resume en 5 líneas' :
            modo === 'preguntas' ? '❓ 3 preguntas tipo quiz con respuestas' :
            modo === 'flashcards' ? '🃏 3 flashcards' :
            '⚖️ 3 afirmaciones V/F'
        }`;
        
        try {
            const response = await fetch('https://corsproxy.io/?url=' + encodeURIComponent('https://api.groq.com/openai/v1/chat/completions'), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'llama-3.1-8b-instant',
                    messages: [
                        { role: 'system', content: 'Asistente concisa' },
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 400,
                    temperature: 0.7
                })
            });
            
            if (response.status === 429) {
                throw new Error('⏳ Límite alcanzado. Espera 3 minutos antes de procesar la siguiente sección.');
            }
            
            const data = await response.json();
            const resultado = data.choices?.[0]?.message?.content;
            
            resultDiv.textContent = `✨ Sección ${seccionActual + 1}:\n\n${resultado}`;
            
        } catch (err) {
            resultDiv.textContent = `⚠️ Error: ${err.message}`;
        } finally {
            btn.disabled = false;
        }
    }
    
    // Inicializar
    selectSection(0);
    
    // Guardar API Key
    const apiKeyInput = prompt('🔐 Ingresa tu API Key de Groq (se guardará):');
    if (apiKeyInput) {
        localStorage.setItem('groq_api_key', apiKeyInput);
    }
</script>
</body>
</html>
